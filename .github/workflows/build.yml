name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install backend dependencies
        working-directory: backend
        run: npm install
        
      - name: Build backend
        working-directory: backend
        run: npx tsc --skipLibCheck
        
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install
        
      - name: Build frontend
        working-directory: frontend
        run: npx vite build
        
      - name: Copy frontend to backend public
        run: |
          Copy-Item -Path "frontend\dist" -Destination "backend\public" -Recurse -Force
          
      - name: Build Electron app
        working-directory: frontend
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --win --x64
        continue-on-error: true
        
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Mixture-of-Agents-Windows-x64
          path: release/win-unpacked/
          retention-days: 30
          
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install & Build
        run: |
          cd backend && npm install && npx tsc --skipLibCheck
          cd ../frontend && npm install && npx vite build
          cp -r ../frontend/dist ../backend/public
          CSC_IDENTITY_AUTO_DISCOVERY=false npx electron-builder --mac --x64
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: Mixture-of-Agents-macOS-x64
          path: release/
          retention-days: 30
