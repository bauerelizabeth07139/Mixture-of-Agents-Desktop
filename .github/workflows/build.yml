name: Build & Release Desktop App

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend deps
        working-directory: backend
        run: npm install

      - name: Build backend
        working-directory: backend
        shell: bash
        run: |
          sed -i 's/"strict": true/"strict": false/' tsconfig.json
          npx tsc || true

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npx vite build

      - name: Copy frontend dist to backend/public
        shell: bash
        run: |
          rm -rf backend/public
          cp -r frontend/dist backend/public

      - name: Bundle node.exe
        shell: bash
        run: cp $(which node) frontend/node.exe

      - name: Build Electron
        working-directory: frontend
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        shell: bash
        run: |
          node -e "const p=require('./package.json');p.build=p.build||{};p.build.extraResources=p.build.extraResources||[];p.build.extraResources.push({from:'node.exe',to:'node.exe'});require('fs').writeFileSync('package.json',JSON.stringify(p,null,2))"
          npx electron-builder --dir --x64 || true

      - name: Create zip
        shell: bash
        run: |
          7z a -tzip Mixture-of-Agents-Windows-x64.zip dist-exe/win-unpacked/ || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mixture-of-Agents-Windows-x64
          path: Mixture-of-Agents-Windows-x64.zip
          retention-days: 90

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.2.0
          name: Mixture of Agents Desktop v1.2.0
          body: 'Multi-model AI agent system with Claude Code architecture'
          files: Mixture-of-Agents-Windows-x64.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}