name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: npm install
        working-directory: backend

      - name: Build backend
        run: npx tsc
        working-directory: backend

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build frontend
        run: npx vite build
        working-directory: frontend

      - name: Install root dependencies
        run: npm install

      - name: Build Electron portable exe
        run: npx electron-builder --win portable --x64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Verify exe exists
        run: |
          dir release\*.exe
          echo "BUILD_SUCCESS=true" >> $env:GITHUB_ENV

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Mixture of Agents Desktop ${{ github.ref_name }}"
          body: |
            ## Mixture of Agents Desktop ${{ github.ref_name }}
            
            ### 下载
            - 下载 `Mixture-of-Agents-*-portable.exe`，双击即可运行
            - 无需安装 Node.js 或任何依赖
            
            ### 功能
            - 🧠 多模型协同调度引擎
            - 📦 17+ 家模型提供商
            - 🔌 MCP 服务器 + ⚡ 技能库
            - 🧪 模型能力测试
            - 🖥️ 独立桌面窗口
          files: |
            release/Mixture-of-Agents-*-portable.exe
          draft: false
          prerelease: false
